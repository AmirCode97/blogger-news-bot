name: Blogger News Bot

on:
  schedule:
    # هر 6 ساعت اجرا می‌شود
    - cron: "0 */6 * * *"
  workflow_dispatch: # امکان اجرای دستی

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Create .env file
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_EXTRA_CONFIG: ${{ secrets.APP_EXTRA_CONFIG }}
        run: |
          cat > .env << EOF
          BLOG_ID=$BLOG_ID
          GOOGLE_CREDENTIALS_FILE=credentials.json
          GEMINI_API_KEY=$GEMINI_API_KEY
          CHECK_INTERVAL_HOURS=6
          MAX_NEWS_PER_CHECK=20
          USE_PROXY=true
          APP_EXTRA_CONFIG=$APP_EXTRA_CONFIG
          EOF

      - name: Restore news cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: news_cache.json
          key: news-cache-${{ github.run_id }}
          restore-keys: |
            news-cache-

      - name: Run News Bot
        run: python main.py --once
        env:
          PYTHONUNBUFFERED: 1
          BLOGGER_TOKEN_BASE64: ${{ secrets.BLOGGER_TOKEN_BASE64 }}

      - name: Save news cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: news_cache.json
          key: news-cache-${{ github.run_id }}
