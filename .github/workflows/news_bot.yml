name: Blogger News Bot

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Setup OpenVPN (Germany)
        if: ${{ secrets.VPN_OVPN_CONFIG != '' }}
        env:
          VPN_OVPN_CONFIG: ${{ secrets.VPN_OVPN_CONFIG }}
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          sudo apt-get install -y openvpn openvpn-systemd-resolved
          echo "$VPN_OVPN_CONFIG" > /tmp/vpn.ovpn
          echo "$VPN_USERNAME" > /tmp/vpn_auth.txt
          echo "$VPN_PASSWORD" >> /tmp/vpn_auth.txt
          chmod 600 /tmp/vpn_auth.txt
          # Add auth-user-pass directive if not already in config
          grep -q 'auth-user-pass' /tmp/vpn.ovpn || echo 'auth-user-pass /tmp/vpn_auth.txt' >> /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn --daemon --log /tmp/vpn.log
          # Wait for tun0 interface to come up (max 30s)
          for i in $(seq 1 30); do
            ip addr show tun0 > /dev/null 2>&1 && echo "[VPN] Connected!" && break
            echo "[VPN] Waiting... ($i/30)"
            sleep 1
          done
          ip addr show tun0 || echo "[VPN] WARNING: tun0 not found"

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Create .env file
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_EXTRA_CONFIG: ${{ secrets.APP_EXTRA_CONFIG }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          SAFE_CONFIG=$(echo "$APP_EXTRA_CONFIG" | tr '\n' ' ' | sed "s/\"/'/g")
          cat > .env <<EOF
          BLOG_ID=${BLOG_ID}
          GOOGLE_CREDENTIALS_FILE=credentials.json
          GEMINI_API_KEY=${GEMINI_API_KEY}
          CHECK_INTERVAL_HOURS=6
          MAX_NEWS_PER_CHECK=20
          USE_PROXY=true
          PROXY_URL=${PROXY_URL}
          APP_EXTRA_CONFIG="${SAFE_CONFIG}"
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Restore news cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: news_cache.json
          key: news-cache-${{ github.run_id }}
          restore-keys: |
            news-cache-

      - name: Run News Bot
        run: python main.py --once
        env:
          PYTHONUNBUFFERED: 1
          BLOGGER_TOKEN_BASE64: ${{ secrets.BLOGGER_TOKEN_BASE64 }}

      - name: Save news cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: news_cache.json
          key: news-cache-${{ github.run_id }}
