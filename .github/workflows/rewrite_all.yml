name: Rewrite All Blog Posts

on:
  workflow_dispatch: # اجازه اجرای دستی از توی سایت گیت‌هاب

jobs:
  rewrite:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Rewrite Script
        timeout-minutes: 330
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_TOKEN_BASE64: ${{ secrets.BLOGGER_TOKEN_BASE64 }}
          GOOGLE_CREDENTIALS_FILE: credentials.json
        run: |
          # اجرای اسکریپت
          # اسکریپت بعد از ۵ ساعت خودش متوقف میشه تا پروگرس ذخیره بشه
          python rewrite_all_posts.py

      - name: Commit and Push Progress
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add rewrite_progress.json
          git commit -m "Update rewrite progress [skip ci]" || echo "No changes to commit"
          git push
